services:
  wame:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - wame_data:/data
    environment:
      API_KEY: ${API_KEY}
      PORT: 3000
      DATA_DIR: /data
      SESSION_DIR: /data/sessions
      WEBHOOKS_DIR: /data/webhooks

volumes:
  wame_data:
