<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WA SENDER // CONTROL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

:root {
  --green: #00ff41;
  --green-dim: #00c032;
  --green-faint: #003d0f;
  --green-glow: rgba(0,255,65,0.15);
  --yellow: #ffd700;
  --red: #ff3131;
  --bg: #020b02;
  --panel: #050f05;
  --border: #0a2a0a;
  --border-bright: #1a4a1a;
  --text: #a0ffb0;
  --text-dim: #4a8a54;
  --text-faint: #1a3a1e;
  --font-mono: 'Share Tech Mono', monospace;
  --font-display: 'VT323', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* CRT scanlines */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
  pointer-events: none;
  z-index: 9999;
}

/* Vignette */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.6) 100%);
  pointer-events: none;
  z-index: 9998;
}

/* ── Login screen ── */
#login-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 500;
}

.login-box {
  background: var(--panel);
  border: 1px solid var(--border-bright);
  padding: 3rem 2.5rem;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 0 60px rgba(0,255,65,0.07);
}

.login-logo {
  font-family: var(--font-display);
  font-size: 2.8rem;
  color: var(--green);
  text-shadow: 0 0 20px var(--green);
  letter-spacing: 0.1em;
  margin-bottom: 0.25rem;
}

.login-logo span { color: var(--text-dim); }

.login-sub {
  font-size: 0.68rem;
  color: var(--text-dim);
  letter-spacing: 0.12em;
  margin-bottom: 2.5rem;
}

.login-box label {
  display: block;
  font-size: 0.7rem;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  margin-bottom: 0.4rem;
}

.login-box input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border-bright);
  color: var(--green);
  font-family: var(--font-mono);
  font-size: 1rem;
  padding: 0.65rem 0.85rem;
  outline: none;
  margin-bottom: 1.5rem;
  transition: border-color 0.2s, box-shadow 0.2s;
  letter-spacing: 0.05em;
}

.login-box input:focus {
  border-color: var(--green);
  box-shadow: 0 0 12px var(--green-glow);
}

.login-error {
  font-size: 0.7rem;
  color: var(--red);
  margin-top: -1rem;
  margin-bottom: 1rem;
  letter-spacing: 0.06em;
  min-height: 1rem;
}

.btn-login {
  width: 100%;
  font-family: var(--font-mono);
  font-size: 0.85rem;
  padding: 0.65rem;
  border: 1px solid var(--green);
  cursor: pointer;
  background: transparent;
  color: var(--green);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  transition: all 0.15s;
}

.btn-login:hover {
  background: var(--green);
  color: var(--bg);
  box-shadow: 0 0 16px var(--green-glow);
}

.btn-login:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Header ── */
header {
  border-bottom: 1px solid var(--border-bright);
  padding: 1.25rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
}

header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--green), transparent);
}

.logo {
  font-family: var(--font-display);
  font-size: 2.2rem;
  color: var(--green);
  letter-spacing: 0.1em;
  text-shadow: 0 0 20px var(--green), 0 0 40px rgba(0,255,65,0.3);
  line-height: 1;
}

.logo span { color: var(--text-dim); }

.header-right {
  display: flex;
  align-items: center;
  gap: 1.5rem;
}

.sys-time {
  font-size: 0.75rem;
  color: var(--text-dim);
  text-align: right;
  line-height: 1.6;
}

.sys-time strong { color: var(--green); display: block; font-size: 1rem; }

.btn-logout {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  padding: 0.25rem 0.65rem;
  border: 1px solid var(--text-faint);
  cursor: pointer;
  background: transparent;
  color: var(--text-dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: all 0.15s;
}

.btn-logout:hover { border-color: var(--red); color: var(--red); }

/* ── Status bar ── */
#status-bar {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 0.5rem 2rem;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  font-size: 0.68rem;
  color: var(--text-dim);
}

.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
  margin-right: 0.3rem;
}

/* ── Main layout ── */
main {
  padding: 2rem;
  display: grid;
  grid-template-columns: 1fr;
  gap: 2rem;
  max-width: 1200px;
  margin: 0 auto;
}

/* ── Section headers ── */
.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--border-bright);
}

.section-title {
  font-family: var(--font-display);
  font-size: 1.4rem;
  color: var(--green);
  letter-spacing: 0.12em;
}

.section-title::before { content: '> '; color: var(--text-dim); }

/* ── Buttons ── */
.btn {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  padding: 0.35rem 0.85rem;
  border: 1px solid;
  cursor: pointer;
  background: transparent;
  letter-spacing: 0.08em;
  transition: all 0.15s;
  text-transform: uppercase;
}

.btn-primary { color: var(--green); border-color: var(--green); }
.btn-primary:hover { background: var(--green); color: var(--bg); box-shadow: 0 0 12px var(--green-glow); }

.btn-danger { color: var(--red); border-color: var(--red); font-size: 0.65rem; }
.btn-danger:hover { background: var(--red); color: #fff; }

.btn-warn { color: var(--yellow); border-color: var(--yellow); }
.btn-warn:hover { background: var(--yellow); color: var(--bg); }

.btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── Instances grid ── */
#instances-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1.25rem;
}

/* ── Instance card — sin animation para evitar titileo ── */
.instance-card {
  background: var(--panel);
  border: 1px solid var(--border-bright);
  padding: 1.25rem;
  position: relative;
  transition: border-color 0.4s, box-shadow 0.4s;
}

/* Solo animar al crear por primera vez */
.instance-card.new-card {
  animation: cardIn 0.3s ease forwards;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.instance-card.connected {
  border-color: rgba(0,255,65,0.4);
  box-shadow: 0 0 16px rgba(0,255,65,0.05), inset 0 0 20px rgba(0,255,65,0.03);
}

.instance-card.qr { border-color: rgba(255,215,0,0.4); }
.instance-card.logged_out, .instance-card.error { border-color: rgba(255,49,49,0.3); }

.card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 1rem;
  gap: 0.5rem;
}

.instance-name {
  font-family: var(--font-display);
  font-size: 1.5rem;
  color: var(--green);
  letter-spacing: 0.06em;
  line-height: 1;
  word-break: break-all;
}

.instance-phone { font-size: 0.68rem; color: var(--text-dim); margin-top: 0.2rem; }

.badge {
  font-size: 0.62rem;
  padding: 0.2rem 0.5rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  border: 1px solid;
  white-space: nowrap;
  flex-shrink: 0;
}

.badge.connected { color: var(--green); border-color: var(--green); }
.badge.connecting, .badge.qr { color: var(--yellow); border-color: var(--yellow); }
.badge.logged_out, .badge.disconnected { color: var(--red); border-color: var(--red); }
.badge.unknown { color: var(--text-dim); border-color: var(--text-dim); }

.qr-wrap {
  margin: 1rem 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
}

.qr-label { font-size: 0.68rem; color: var(--yellow); letter-spacing: 0.1em; }

.qr-wrap img {
  width: 180px;
  height: 180px;
  border: 2px solid var(--yellow);
  padding: 6px;
  background: #fff;
  image-rendering: pixelated;
}

.card-meta { font-size: 0.65rem; color: var(--text-dim); margin-bottom: 0.75rem; line-height: 1.7; }
.card-meta span { color: var(--text); }

.card-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }

.empty-state {
  grid-column: 1/-1;
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-faint);
  font-size: 0.8rem;
  border: 1px dashed var(--border);
  letter-spacing: 0.08em;
}

.empty-state .big { font-family: var(--font-display); font-size: 2rem; color: var(--text-dim); display: block; margin-bottom: 0.5rem; }

/* ── Logs ── */
.logs-table-wrap { overflow-x: auto; border: 1px solid var(--border-bright); }

table { width: 100%; border-collapse: collapse; font-size: 0.72rem; }

thead tr { background: var(--green-faint); border-bottom: 1px solid var(--border-bright); }

th {
  text-align: left;
  padding: 0.6rem 0.85rem;
  color: var(--green);
  letter-spacing: 0.1em;
  font-weight: normal;
  text-transform: uppercase;
  white-space: nowrap;
}

td { padding: 0.5rem 0.85rem; color: var(--text-dim); border-bottom: 1px solid var(--border); white-space: nowrap; }
tr:hover td { background: rgba(0,255,65,0.03); color: var(--text); }

td.ok { color: var(--green); }
td.error { color: var(--red); }
td.type-text { color: #88aaff; }
td.type-audio { color: #ff88cc; }
td.type-image { color: #ffaa44; }
td.type-document { color: #aaffee; }

.no-logs { text-align: center; padding: 2rem; color: var(--text-faint); font-size: 0.75rem; letter-spacing: 0.08em; }

/* ── Modal ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.modal {
  background: var(--panel);
  border: 1px solid var(--green);
  box-shadow: 0 0 40px rgba(0,255,65,0.15);
  padding: 2rem;
  min-width: 340px;
}

.modal-title { font-family: var(--font-display); font-size: 1.6rem; color: var(--green); margin-bottom: 1.25rem; letter-spacing: 0.1em; }

.modal label { display: block; font-size: 0.72rem; color: var(--text-dim); margin-bottom: 0.3rem; letter-spacing: 0.08em; }

.modal input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border-bright);
  color: var(--green);
  font-family: var(--font-mono);
  font-size: 0.9rem;
  padding: 0.5rem 0.75rem;
  outline: none;
  margin-bottom: 1.25rem;
  transition: border-color 0.2s;
}

.modal input:focus { border-color: var(--green); box-shadow: 0 0 8px var(--green-glow); }
.modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }

/* ── Webhooks ── */
.webhooks-section { margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
.webhooks-title { font-size: 0.65rem; color: var(--text-dim); letter-spacing: 0.1em; margin-bottom: 0.5rem; display: flex; align-items: center; justify-content: space-between; }
.webhook-item { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; padding: 0.3rem 0; font-size: 0.62rem; border-bottom: 1px solid var(--border); }
.webhook-url { color: var(--text); word-break: break-all; flex: 1; }
.webhook-events { color: var(--yellow); white-space: nowrap; font-size: 0.58rem; }
.webhook-del { background: none; border: none; color: var(--red); cursor: pointer; font-family: var(--font-mono); font-size: 0.65rem; padding: 0.15rem 0.4rem; }
.webhook-del:hover { color: #fff; background: var(--red); }
.webhook-empty { font-size: 0.6rem; color: var(--text-faint); }
.btn-add-hook { font-size: 0.58rem; padding: 0.15rem 0.5rem; }

.modal-checks { display: flex; gap: 1rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
.modal-checks label { display: flex; align-items: center; gap: 0.3rem; font-size: 0.72rem; color: var(--text); cursor: pointer; }
.modal-checks input[type="checkbox"] { accent-color: var(--green); }

/* ── Toast ── */
#toast {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  font-size: 0.75rem;
  padding: 0.6rem 1rem;
  border: 1px solid;
  background: var(--panel);
  z-index: 9000;
  letter-spacing: 0.06em;
  max-width: 320px;
}

#toast.ok  { color: var(--green); border-color: var(--green); }
#toast.err { color: var(--red);   border-color: var(--red);   }
#toast.info { color: var(--yellow); border-color: var(--yellow); }
#toast.hidden { display: none; }

.hidden { display: none !important; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border-bright); }
::-webkit-scrollbar-thumb:hover { background: var(--green-dim); }
</style>
</head>
<body>

<!-- ── Login screen ── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">WA<span>//</span>SENDER</div>
    <div class="login-sub">UNIDIRECTIONAL MESSAGING SYSTEM</div>
    <label>API KEY</label>
    <input type="password" id="login-input" placeholder="••••••••••••" autocomplete="off">
    <div class="login-error" id="login-error"></div>
    <button class="btn-login" id="login-btn">ACCEDER →</button>
  </div>
</div>

<!-- ── App ── -->
<div id="app" class="hidden">

  <header>
    <div>
      <div class="logo">WA<span>//</span>SENDER <span style="font-size:1.1rem;color:var(--text-dim)">CONTROL</span></div>
      <div style="font-size:0.65rem;color:var(--text-dim);margin-top:0.2rem;letter-spacing:0.1em">UNIDIRECTIONAL MESSAGING SYSTEM v1.0</div>
    </div>
    <div class="header-right">
      <div class="sys-time">
        <strong id="clock">--:--:--</strong>
        <span id="date-display">---</span>
      </div>
      <button class="btn-logout">CERRAR SESIÓN</button>
    </div>
  </header>

  <div id="status-bar">
    <span><span class="dot"></span>AUTENTICADO</span>
    <span style="color:var(--text-faint)">|</span>
    <span>POLLING: <span id="poll-status" style="color:var(--green)">ON</span></span>
  </div>

  <main>
    <section>
      <div class="section-head">
        <div class="section-title">INSTANCIAS</div>
        <button class="btn btn-primary" data-id="btn-new-instance">+ NUEVA INSTANCIA</button>
      </div>
      <div id="instances-grid">
        <div class="empty-state"><span class="big">[∅]</span>no hay instancias activas</div>
      </div>
    </section>

    <section>
      <div class="section-head">
        <div class="section-title">LOGS RECIENTES</div>
        <button class="btn btn-primary" style="font-size:0.65rem" data-id="btn-refresh-logs">↺ REFRESH</button>
      </div>
      <div class="logs-table-wrap">
        <table>
          <thead>
            <tr>
              <th>INSTANCIA</th>
              <th>DESTINO</th>
              <th>TIPO</th>
              <th>ESTADO</th>
              <th>TIMESTAMP</th>
            </tr>
          </thead>
          <tbody id="logs-body">
            <tr><td colspan="5" class="no-logs">sin datos</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

</div>

<!-- Modal nueva instancia -->
<div class="modal-overlay hidden" id="new-modal">
  <div class="modal">
    <div class="modal-title">NUEVA INSTANCIA</div>
    <label>NOMBRE DE INSTANCIA</label>
    <input type="text" id="new-name-input" placeholder="ej: ibsg, grupo-principal..."
           autocomplete="off" spellcheck="false">
    <div class="modal-actions">
      <button class="btn btn-danger" data-id="btn-modal-cancel">CANCELAR</button>
      <button class="btn btn-primary" data-id="btn-modal-create">CONECTAR →</button>
    </div>
  </div>
</div>

<!-- Modal webhook -->
<div class="modal-overlay hidden" id="webhook-modal">
  <div class="modal">
    <div class="modal-title">AGREGAR WEBHOOK</div>
    <input type="hidden" id="webhook-instance">
    <label>URL DEL WEBHOOK</label>
    <input type="url" id="webhook-url-input" placeholder="https://tu-servidor.com/webhook" autocomplete="off">
    <label style="margin-bottom:0.4rem">EVENTOS</label>
    <div class="modal-checks">
      <label><input type="checkbox" value="messages" checked> Mensajes</label>
      <label><input type="checkbox" value="group.join"> Entra a grupo</label>
      <label><input type="checkbox" value="group.leave"> Sale de grupo</label>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" data-id="btn-hook-cancel">CANCELAR</button>
      <button class="btn btn-primary" data-id="btn-hook-create">GUARDAR</button>
    </div>
  </div>
</div>

<div id="toast" class="hidden"></div>

<script src="app.js"></script>
</body>
</html>
